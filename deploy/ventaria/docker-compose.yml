# Продакшен: API + Postgres. Статика — в sibling-каталоге public/ (см. workflow deploy-ventaria).
# На сервере один раз создайте .env рядом с этим файлом (${DEPLOY_HOME}/.env) — деплой его не затирает.
#
# DATABASE_URL: postgres://USER:PASS@postgres:5432/DB
#
# Порты: см. `.env.example` — API_PORT (внутри контейнера), API_PUBLISH_PORT (хост),
# API_BIND (127.0.0.1 по умолчанию). Подстановка при `docker compose up` из этого каталога.

name: ai-ventaria

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_seller}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [appnet]

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - target: 5672
        published: ${RABBITMQ_PUBLISH_PORT:-5672}
        host_ip: ${RABBITMQ_BIND:-127.0.0.1}
        protocol: tcp
      - target: 15672
        published: ${RABBITMQ_UI_PUBLISH_PORT:-15672}
        host_ip: ${RABBITMQ_BIND:-127.0.0.1}
        protocol: tcp
    networks: [appnet]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - target: ${API_PORT:-3001}
        published: ${API_PUBLISH_PORT:-3001}
        host_ip: ${API_BIND:-127.0.0.1}
        protocol: tcp
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- "http://127.0.0.1:$${API_PORT:-3001}/health" || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks: [appnet]

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    ports:
      - target: 9090
        published: ${PROMETHEUS_PUBLISH_PORT:-9090}
        host_ip: ${PROMETHEUS_BIND:-127.0.0.1}
        protocol: tcp
    networks: [appnet]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://ai.ventaria.ru/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - target: 3000
        published: ${GRAFANA_PUBLISH_PORT:-3060}
        host_ip: ${GRAFANA_BIND:-127.0.0.1}
        protocol: tcp
    networks: [appnet]

networks:
  appnet:

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
