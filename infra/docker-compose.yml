services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_seller}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [appnet]
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5452}:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [appnet]
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [appnet]
    ports:
      - "${RABBITMQ_PUBLISH_PORT:-5672}:5672"
      - "${RABBITMQ_UI_PUBLISH_PORT:-15672}:15672"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- "http://127.0.0.1:$${API_PORT:-3001}/health" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [appnet]
    # Хост:контейнер — значения из .env при запуске compose из каталога infra/
    ports:
      - "${API_PUBLISH_PORT:-3055}:${API_PORT:-3001}"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- "http://127.0.0.1:$${WEB_PORT:-3000}/" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [appnet]
    ports:
      - "${WEB_PUBLISH_PORT:-3050}:${WEB_PORT:-3000}"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    networks: [appnet]
    ports:
      - "${PROMETHEUS_PUBLISH_PORT:-9090}:9090"

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks: [appnet]
    ports:
      - "${LOKI_PUBLISH_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    networks: [appnet]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - loki
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    networks: [appnet]
    ports:
      - "${GRAFANA_PUBLISH_PORT:-3060}:3000"

networks:
  appnet:

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  promtail_positions:
  grafana_data:
