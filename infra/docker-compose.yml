services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_seller}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [appnet]
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5452}:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [appnet]
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- "http://127.0.0.1:$${API_PORT:-3001}/health" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [appnet]
    # Хост:контейнер — значения из .env при запуске compose из каталога infra/
    ports:
      - "${API_PUBLISH_PORT:-3055}:${API_PORT:-3001}"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- "http://127.0.0.1:$${WEB_PORT:-3000}/" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [appnet]
    ports:
      - "${WEB_PUBLISH_PORT:-3050}:${WEB_PORT:-3000}"

networks:
  appnet:

volumes:
  postgres_data:
