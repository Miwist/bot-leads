# Локальная разработка в Docker: hot-reload (watch) + Telegram long polling.
# Запуск: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up --build
#
# Обязательно задайте в infra/.env (или переопределите):
#   TELEGRAM_UPDATES_MODE=polling
# Для продакшена используйте только docker-compose.yml и TELEGRAM_UPDATES_MODE=webhook
# с публичным TELEGRAM_WEBHOOK_BASE_URL (HTTPS).

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    environment:
      TELEGRAM_UPDATES_MODE: polling
    volumes:
      - ../apps/api:/app
      - api_node_modules:/app/node_modules
    command: ["sh", "-c", "npm run migration:run && npm run dev"]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    volumes:
      - ../apps/web:/app
      - web_node_modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "npx next dev --hostname 0.0.0.0 --port ${WEB_PORT:-3000}",
      ]

volumes:
  api_node_modules:
  web_node_modules:
