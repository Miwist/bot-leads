# Локальная разработка в Docker: hot-reload (watch) + Telegram long polling.
# Запуск: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up --build
#
# Порты 3000/3001 на хосте и URL для фронта задаются здесь — не зависят от API_PUBLISH_PORT / NEXT_PUBLIC
# в infra/.env (часто там прод или 3055, из‑за чего браузер не попадал в контейнер api).
#
# Для продакшена: общий бот всегда работает через polling; webhook можно оставить только для кастомных ботов.

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      TELEGRAM_UPDATES_MODE: polling
      # Внутри контейнера всегда 3001, чтобы совпадало с API_INTERNAL_URL у web
      API_PORT: "3001"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_ENABLED: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
      - api_node_modules:/app/node_modules
    # Обновляем зависимости на старте, чтобы volume /app/node_modules не отставал от package-lock.
    command: ["sh", "-c", "npm install && npm run migration:run && npm run dev"]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      # Браузер на хосте → опубликованный порт API (совпадает с ports выше)
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # SSR / запросы из контейнера web → сервис api в сети compose
      API_INTERNAL_URL: http://api:3001
    volumes:
      - ../apps/web:/app
      - web_node_modules:/app/node_modules
    command: ["sh", "-c", "npm run dev -- --hostname 0.0.0.0 --port 3000"]

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  api_node_modules:
  web_node_modules:
